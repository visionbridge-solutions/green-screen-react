[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "green-screen-client"
version = "1.3.2"
description = "Python client for green-screen-proxy — typed async REST + WebSocket adapter for TN5250/TN3270/VT/HP6530 terminal emulation"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
keywords = ["tn5250", "tn3270", "as400", "ibm-i", "terminal", "emulator", "green-screen"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Framework :: AsyncIO",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Terminals :: Terminal Emulators/X Terminals",
]
dependencies = [
  "httpx>=0.27",
  "websockets>=12.0",
]

[project.optional-dependencies]
test = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
]

[project.urls]
Homepage = "https://github.com/legacybridge-software/green-screen-react"
Repository = "https://github.com/legacybridge-software/green-screen-react"
Issues = "https://github.com/legacybridge-software/green-screen-react/issues"

[tool.hatch.build.targets.wheel]
packages = ["green_screen_client"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
