name: CI

on:
  push:
    branches: [production]
  pull_request:
    branches: [production]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint -w packages/react
      - run: npm run test -w packages/react
      - run: npm run build -w packages/react
      - run: npm run build -w packages/proxy
      - run: npm run build:ui -w packages/standalone
