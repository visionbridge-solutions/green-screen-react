name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/green-screen-client
    permissions:
      id-token: write
    defaults:
      run:
        working-directory: packages/client-py
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: python -m pip install --upgrade build

      - name: Verify version matches release tag
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          EXPECTED="${RELEASE_TAG#v}"
          if [ "$PKG_VERSION" != "$EXPECTED" ]; then
            echo "::error::green-screen-client version ($PKG_VERSION) does not match release tag ($EXPECTED)"
            exit 1
          fi

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/client-py/dist/
